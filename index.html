<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Молекулярний калькулятор</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #FDF6F0;
            --bg2: #F7EDE4;
            --fg: #4A4063;
            --fg-light: #7B7194;
            --accent: #E8998D;
            --accent2: #D4A5A5;
            --card: rgba(255,255,255,0.7);
            --border: rgba(74,64,99,0.1);
            --shadow: rgba(74,64,99,0.08);
            --alkali: #F8C8C8;
            --alkaline: #FADCAA;
            --transition: #C8D8F0;
            --post-transition: #C8E8D8;
            --metalloid: #D8F0C8;
            --nonmetal: #F0ECC8;
            --halogen: #D8C8F0;
            --noble: #E8C8F0;
            --lanthanide: #C8F0E8;
            --actinide: #F0D8C8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Фонові блоби */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
            animation: blobFloat 20s ease-in-out infinite;
        }
        .blob-1 { width: 400px; height: 400px; background: #F8C8C8; top: -100px; left: -100px; }
        .blob-2 { width: 350px; height: 350px; background: #C8D8F0; top: 30%; right: -80px; animation-delay: -7s; }
        .blob-3 { width: 300px; height: 300px; background: #D8F0C8; bottom: 10%; left: 20%; animation-delay: -14s; }
        .blob-4 { width: 250px; height: 250px; background: #E8C8F0; bottom: -50px; right: 30%; animation-delay: -3s; }

        @keyframes blobFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -20px) scale(1.05); }
            50% { transform: translate(-20px, 30px) scale(0.95); }
            75% { transform: translate(20px, 20px) scale(1.02); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 16px 60px;
        }

        /* Заголовок */
        header {
            text-align: center;
            margin-bottom: 28px;
        }
        header h1 {
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            color: var(--fg);
            letter-spacing: -0.5px;
        }
        header h1 span {
            color: var(--accent);
        }
        header p {
            color: var(--fg-light);
            font-size: 0.95rem;
            margin-top: 4px;
        }

        /* Калькулятор */
        .calc-section {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px 28px;
            margin-bottom: 28px;
            box-shadow: 0 8px 32px var(--shadow);
        }
        .calc-row {
            display: flex;
            gap: 12px;
            align-items: stretch;
            flex-wrap: wrap;
        }
        .calc-input-wrap {
            flex: 1;
            min-width: 200px;
            position: relative;
        }
        .calc-input-wrap i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--fg-light);
            font-size: 0.9rem;
        }
        .calc-input {
            width: 100%;
            padding: 14px 16px 14px 42px;
            border: 2px solid var(--border);
            border-radius: 14px;
            background: rgba(255,255,255,0.6);
            font-family: 'Quicksand', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--fg);
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .calc-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(232,153,141,0.15);
        }
        .calc-input::placeholder {
            color: var(--fg-light);
            opacity: 0.5;
            font-weight: 400;
        }
        .calc-btn {
            padding: 14px 28px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            font-family: 'Quicksand', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }
        .calc-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(232,153,141,0.35);
        }
        .calc-btn:active { transform: translateY(0); }
        .calc-btn.secondary {
            background: rgba(74,64,99,0.08);
            color: var(--fg-light);
        }
        .calc-btn.secondary:hover {
            background: rgba(74,64,99,0.14);
            box-shadow: none;
        }

        /* Швидкі формули */
        .quick-formulas {
            margin-top: 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .quick-formulas span {
            font-size: 0.82rem;
            color: var(--fg-light);
            font-weight: 600;
        }
        .quick-chip {
            padding: 5px 12px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: rgba(255,255,255,0.5);
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--fg);
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Quicksand', sans-serif;
        }
        .quick-chip:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        /* Результат */
        .result-area {
            margin-top: 16px;
            min-height: 0;
            overflow: hidden;
            transition: min-height 0.4s ease;
        }
        .result-card {
            background: linear-gradient(135deg, rgba(232,153,141,0.1), rgba(200,216,240,0.1));
            border: 1px solid rgba(232,153,141,0.2);
            border-radius: 16px;
            padding: 20px;
            animation: resultIn 0.4s ease;
        }
        @keyframes resultIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-mass {
            font-family: 'Quicksand', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }
        .result-mass small {
            font-size: 0.9rem;
            color: var(--fg-light);
            font-weight: 400;
        }
        .result-breakdown {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .result-tag {
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 0.82rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .result-tag .tag-symbol {
            font-weight: 700;
            font-size: 0.9rem;
        }
        .error-msg {
            color: #D46A6A;
            font-weight: 600;
            font-size: 0.9rem;
            animation: resultIn 0.3s ease;
        }

        /* Таблиця Менделєєва */
        .table-section {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px var(--shadow);
            overflow-x: auto;
        }
        .table-section h2 {
            font-family: 'Quicksand', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 14px;
            color: var(--fg);
        }
        .ptable {
            display: grid;
            grid-template-columns: repeat(18, minmax(52px, 1fr));
            gap: 3px;
            min-width: 960px;
        }
        .el-cell {
            aspect-ratio: 1;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
            position: relative;
            overflow: hidden;
            border: 1.5px solid transparent;
        }
        .el-cell::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 8px;
            opacity: 0;
            background: rgba(255,255,255,0.5);
            transition: opacity 0.2s;
        }
        .el-cell:hover::before { opacity: 1; }
        .el-cell:hover {
            transform: scale(1.15);
            box-shadow: 0 4px 16px var(--shadow);
            z-index: 5;
            border-color: rgba(74,64,99,0.15);
        }
        .el-cell:active { transform: scale(1.05); }
        .el-cell.highlighted {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 2px rgba(232,153,141,0.3);
        }
        .el-cell.dimmed { opacity: 0.35; }

        .el-number {
            font-size: 0.55rem;
            font-weight: 600;
            opacity: 0.6;
            line-height: 1;
        }
        .el-symbol {
            font-family: 'Quicksand', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            line-height: 1.2;
        }
        .el-mass {
            font-size: 0.45rem;
            opacity: 0.55;
            line-height: 1;
        }

        /* Маркери лантаноїдів/актинойдів */
        .marker-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 0.48rem;
            font-weight: 700;
            text-align: center;
            line-height: 1.1;
            cursor: default;
            padding: 2px;
        }
        .marker-lan { background: var(--lanthanide); color: var(--fg); }
        .marker-act { background: var(--actinide); color: var(--fg); }

        /* Легенда */
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.72rem;
            color: var(--fg-light);
            font-weight: 600;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        /* Модальне вікно */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(74,64,99,0.25);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 0;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(74,64,99,0.15);
            transform: scale(0.9) translateY(20px);
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }
        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }
        .modal-header {
            padding: 28px 28px 0;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
        }
        .modal-symbol-wrap {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .modal-big-symbol {
            width: 72px;
            height: 72px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Quicksand', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--fg);
        }
        .modal-title-group h2 {
            font-family: 'Quicksand', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--fg);
            line-height: 1.2;
        }
        .modal-title-group .modal-category {
            font-size: 0.78rem;
            color: var(--fg-light);
            font-weight: 600;
            margin-top: 2px;
        }
        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: rgba(74,64,99,0.06);
            color: var(--fg-light);
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
            flex-shrink: 0;
        }
        .modal-close:hover {
            background: rgba(74,64,99,0.12);
            color: var(--fg);
        }
        .modal-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 20px 28px;
        }
        .modal-stat {
            background: rgba(74,64,99,0.03);
            border-radius: 12px;
            padding: 12px;
        }
        .modal-stat-label {
            font-size: 0.68rem;
            color: var(--fg-light);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .modal-stat-value {
            font-family: 'Quicksand', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--fg);
            margin-top: 2px;
        }
        .modal-info {
            padding: 0 28px 24px;
        }
        .modal-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        .modal-info-row:last-child { border-bottom: none; }
        .modal-info-label {
            font-size: 0.8rem;
            color: var(--fg-light);
            font-weight: 600;
        }
        .modal-info-value {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--fg);
            text-align: right;
        }
        .modal-add-btn {
            margin: 0 28px 24px;
            width: calc(100% - 56px);
            padding: 12px;
            border: 2px dashed var(--accent);
            border-radius: 14px;
            background: rgba(232,153,141,0.06);
            color: var(--accent);
            font-family: 'Quicksand', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .modal-add-btn:hover {
            background: var(--accent);
            color: #fff;
            border-style: solid;
        }

        /* Тост */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--fg);
            color: #fff;
            padding: 12px 24px;
            border-radius: 14px;
            font-size: 0.88rem;
            font-weight: 600;
            z-index: 200;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
            box-shadow: 0 8px 30px rgba(74,64,99,0.25);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Підказка таблиці */
        .table-hint {
            text-align: center;
            font-size: 0.78rem;
            color: var(--fg-light);
            margin-top: 10px;
            opacity: 0.7;
        }

        /* Адаптивність */
        @media (max-width: 768px) {
            .container { padding: 16px 10px 40px; }
            .calc-section { padding: 18px; }
            .calc-row { flex-direction: column; }
            .calc-btn { width: 100%; }
            .modal { max-width: 100%; }
            .modal-stats { grid-template-columns: 1fr 1fr; gap: 8px; }
        }

        @media (prefers-reduced-motion: reduce) {
            .blob, .el-cell, .modal, .modal-overlay, .result-card, .toast {
                animation: none !important;
                transition: none !important;
            }
        }

        /* Скролбар */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(74,64,99,0.15); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(74,64,99,0.25); }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="blob blob-4"></div>

<div class="container">
    <header>
        <h1>Молекулярний <span>калькулятор</span></h1>
        <p>Розрахуйте молекулярну масу сполуки та дізнайтеся про кожен елемент</p>
    </header>

    <!-- Калькулятор -->
    <section class="calc-section">
        <div class="calc-row">
            <div class="calc-input-wrap">
                <i class="fa-solid fa-flask"></i>
                <input type="text" class="calc-input" id="formulaInput" placeholder="Введіть формулу, наприклад H2O, Ca(OH)2" autocomplete="off" spellcheck="false">
            </div>
            <button class="calc-btn" onclick="calculate()">
                <i class="fa-solid fa-calculator"></i>&nbsp; Розрахувати
            </button>
            <button class="calc-btn secondary" onclick="clearFormula()">
                <i class="fa-solid fa-eraser"></i>&nbsp; Очистити
            </button>
        </div>
        <div class="quick-formulas">
            <span>Швидко:</span>
            <button class="quick-chip" onclick="setFormula('H2O')">H<sub>2</sub>O</button>
            <button class="quick-chip" onclick="setFormula('NaCl')">NaCl</button>
            <button class="quick-chip" onclick="setFormula('Ca(OH)2')">Ca(OH)<sub>2</sub></button>
            <button class="quick-chip" onclick="setFormula('C6H12O6')">C<sub>6</sub>H<sub>12</sub>O<sub>6</sub></button>
            <button class="quick-chip" onclick="setFormula('H2SO4')">H<sub>2</sub>SO<sub>4</sub></button>
            <button class="quick-chip" onclick="setFormula('Al2(SO4)3')">Al<sub>2</sub>(SO<sub>4</sub>)<sub>3</sub></button>
            <button class="quick-chip" onclick="setFormula('Fe2O3')">Fe<sub>2</sub>O<sub>3</sub></button>
            <button class="quick-chip" onclick="setFormula('CH3COOH')">CH<sub>3</sub>COOH</button>
            <button class="quick-chip" onclick="setFormula('C2H5OH')">C<sub>2</sub>H<sub>5</sub>OH</button>
            <button class="quick-chip" onclick="setFormula('KMnO4')">KMnO<sub>4</sub></button>
        </div>
        <div class="result-area" id="resultArea"></div>
    </section>

    <!-- Таблиця Менделєєва -->
    <section class="table-section">
        <h2><i class="fa-solid fa-table-cells"></i>&nbsp; Таблиця Менделєєва</h2>
        <div class="ptable" id="ptable"></div>
        <div class="legend" id="legend"></div>
        <p class="table-hint">Натисніть на елемент, щоб дізнатися про нього більше та додати до формули</p>
    </section>
</div>

<!-- Модальне вікно -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal" id="modalContent"></div>
</div>

<!-- Тост -->
<div class="toast" id="toast"></div>

<script>
// =====================================================
// ДАНІ ПРО ВСІ 118 ЕЛЕМЕНТИ
// Формат: [символ, назваUA, маса, категорія, період, група, рядок, колонка, конфігурація, густина, т.плавл., т.кип., рік, відкривач]
// =====================================================
const ELEMENTS_RAW = [

[4,"Be","Берилій",9.012,"alkaline",2,2,2,2,"[He]2s²",1.85,1287,2469,1798,"Вокелен"],
[5,"B","Бор",10.81,"metalloid",2,13,2,13,"[He]2s²2p¹",2.34,2076,3927,1808,"Гей-Люссак / Тенар"],
[6,"C","Вуглець",12.011,"nonmetal",2,14,2,14,"[He]2s²2p²",2.267,3550,4027,"---","---"],
[7,"N","Нітроген",14.007,"nonmetal",2,15,2,15,"[He]2s²2p³",0.00125,-210.0,-195.79,1772,"Резерфорд"],
[8,"O","Оксиген",15.999,"nonmetal",2,16,2,16,"[He]2s²2p⁴",0.00143,-218.79,-182.96,1774,"Пристлі / Шеєле"],
[9,"F","Флуор",18.998,"halogen",2,17,2,17,"[He]2s²2p⁵",0.0017,-219.67,-188.11,1886,"Муассан"],
[10,"Ne","Неон",20.18,"noble",2,18,2,18,"[He]2s²2p⁶",0.0009,-248.59,-246.05,1898,"Рамзі / Траверс"],
[11,"Na","Натрій",22.99,"alkali",3,1,3,1,"[Ne]3s¹",0.971,97.72,883,1807,"Деві"],
[12,"Mg","Магній",24.305,"alkaline",3,2,3,2,"[Ne]3s²",1.738,650,1090,1755,"Блек"],

// ПОБУДОВА ТАБЛИЦІ МЕНДЕЛЄЄВА
// =====================================================
function buildTable() {
    const table = document.getElementById('ptable');
    // 10 рядків × 18 колонок
    for (let r = 1; r <= 10; r++) {
        for (let c = 1; c <= 18; c++) {
            // Знайти елемент на цій позиції
            let found = null;
            for (const sym in elements) {
                if (elements[sym].row === r && elements[sym].col === c) {
                    found = elements[sym];
                    break;
                }
            }

            if (found) {
                const cell = document.createElement('div');
                cell.className = 'el-cell';
                cell.dataset.symbol = found.symbol;
                cell.style.background = CATEGORY_COLORS[found.category];
                cell.innerHTML = `
                    <span class="el-number">${found.number}</span>
                    <span class="el-symbol">${found.symbol}</span>
                    <span class="el-mass">${found.mass}</span>
                `;
                cell.addEventListener('click', () => openModal(found.symbol));
                cell.setAttribute('role', 'button');
                cell.setAttribute('aria-label', `${found.name} (${found.symbol}), атомна маса ${found.mass}`);
                cell.setAttribute('tabindex', '0');
                cell.addEventListener('keydown', (e) => { if (e.key === 'Enter') openModal(found.symbol); });
                table.appendChild(cell);
            } else if (r === 6 && c === 3) {
                // Маркер лантаноїдів
                const m = document.createElement('div');
                m.className = 'marker-cell marker-lan';
                m.innerHTML = '57-71<br>La-Lu';
                table.appendChild(m);
            } else if (r === 7 && c === 3) {
                // Маркер актинойдів
                const m = document.createElement('div');
                m.className = 'marker-cell marker-act';
                m.innerHTML = '89-103<br>Ac-Lr';
                table.appendChild(m);
            } else {
                // Порожня клітинка
                const empty = document.createElement('div');
                table.appendChild(empty);
            }
        }
    }

    // Легенда
    const legend = document.getElementById('legend');
    for (const cat in CATEGORY_NAMES) {
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `<div class="legend-dot" style="background:${CATEGORY_COLORS[cat]}"></div>${CATEGORY_NAMES[cat]}`;
        legend.appendChild(item);
    }
}

function parseFormula(str) {
    let i = 0;

    function parse() {
        const result = {};
        while (i < str.length && str[i] !== ')') {
            if (str[i] === '(') {
                i++; // пропускаємо '('
                const inner = parse();
                if (i < str.length && str[i] === ')') i++; // пропускаємо ')'
                const num = parseNumber();
                for (const el in inner) {
                    result[el] = (result[el] || 0) + inner[el] * num;
                }
            } else if (/[A-Z]/.test(str[i])) {
                let symbol = str[i++];
                while (i < str.length && /[a-z]/.test(str[i])) {
                    symbol += str[i++];
                }
                const num = parseNumber();
                result[symbol] = (result[symbol] || 0) + num;
            } else {
                i++; // пропускаємо невідомі символи
            }
        }
        return result;
    }

    function parseNumber() {
        let numStr = '';
        while (i < str.length && /\d/.test(str[i])) {
            numStr += str[i++];
        }
        return numStr ? parseInt(numStr, 10) : 1;
    }

    return parse();
}

// =====================================================
// РОЗРАХУНОК МОЛЕКУЛЯРНОЇ МАСИ
// =====================================================
function calculate() {
    const input = document.getElementById('formulaInput').value.trim();
    const resultArea = document.getElementById('resultArea');

    if (!input) {
        resultArea.innerHTML = '<div class="error-msg"><i class="fa-solid fa-circle-exclamation"></i> Введіть хімічну формулу</div>';
        highlightElements([]);
        return;
    }

    // Перевірка на допустимі символи
    if (!/^[A-Za-z()0-9]+$/.test(input)) {
        resultArea.innerHTML = '<div class="error-msg"><i class="fa-solid fa-circle-exclamation"></i> Формула містить недопустимі символи</div>';
        highlightElements([]);
        return;
    }

    const parsed = parseFormula(input);
    const symbols = Object.keys(parsed);

    if (symbols.length === 0) {
        resultArea.innerHTML = '<div class="error-msg"><i class="fa-solid fa-circle-exclamation"></i> Не вдалося розпізнати формулу</div>';
        highlightElements([]);
        return;
    }

    // Перевірка чи всі елементи існують
    let unknown = [];
    for (const sym of symbols) {
        if (!elements[sym]) unknown.push(sym);
    }

    if (unknown.length > 0) {
        resultArea.innerHTML = `<div class="error-msg"><i class="fa-solid fa-circle-exclamation"></i> Невідомі елементи: ${unknown.join(', ')}</div>`;
        highlightElements([]);
        return;
    }

    // Розрахунок
    let totalMass = 0;
    const breakdown = [];
    for (const sym of symbols) {
        const count = parsed[sym];
        const el = elements[sym];
        const contribution = el.mass * count;
        totalMass += contribution;
        breakdown.push({ symbol: sym, name: el.name, count, mass: el.mass, contribution, category: el.category });
    }

    // Сортування за масою (спадання)
    breakdown.sort((a, b) => b.contribution - a.contribution);

    // Побудова результату
    let tagsHtml = breakdown.map(b => {
        const color = CATEGORY_COLORS[b.category];
        return `<div class="result-tag" style="background:${color}">
            <span class="tag-symbol">${b.symbol}</span>
            <span>${b.count > 1 ? '&times;' + b.count : ''}</span>
            <span>= ${b.contribution.toFixed(3)}</span>
        </div>`;
    }).join('');

    resultArea.innerHTML = `
        <div class="result-card">
            <div class="result-mass">${totalMass.toFixed(3)} <small>г/моль</small></div>
            <div class="result-breakdown">${tagsHtml}</div>
        </div>
    `;

    highlightElements(symbols);
}

// =====================================================
// ПІДСВІТКА ЕЛЕМЕНТІВ У ТАБЛИЦІ
// =====================================================
function highlightElements(symbols) {
    document.querySelectorAll('.el-cell').forEach(cell => {
        cell.classList.remove('highlighted', 'dimmed');
    });
    if (symbols.length > 0) {
        document.querySelectorAll('.el-cell').forEach(cell => {
            if (symbols.includes(cell.dataset.symbol)) {
                cell.classList.add('highlighted');
            } else {
                cell.classList.add('dimmed');
            }
        });
    }
}

// =====================================================
// МОДАЛЬНЕ ВІКНО З ІНФОРМАЦІЄЮ ПРО ЕЛЕМЕНТ
// =====================================================
function openModal(symbol) {
    const el = elements[symbol];
    if (!el) return;

    const color = CATEGORY_COLORS[el.category];
    const catName = CATEGORY_NAMES[el.category] || el.category;

    const fmtDensity = typeof el.density === 'number' ? el.density + ' г/см³' : (el.density || '—');
    const fmtMelt = typeof el.meltPoint === 'number' ? el.meltPoint + ' °C' : (el.meltPoint || '—');
    const fmtBoil = typeof el.boilPoint === 'number' ? el.boilPoint + ' °C' : (el.boilPoint || '—');
    const fmtYear = el.discYear === '---' ? 'Давні_times_' : el.discYear || '—';
    const fmtDiscoverer = el.discoverer === '---' ? 'Відомий з давніх_часів' : (el.discoverer || '—');

    const modal = document.getElementById('modalContent');
    modal.innerHTML = `
        <div class="modal-header">
            <div class="modal-symbol-wrap">
                <div class="modal-big-symbol" style="background:${color}">${el.symbol}</div>
                <div class="modal-title-group">
                    <h2>${el.name}</h2>
                    <div class="modal-category">${catName}</div>
                </div>
            </div>
            <button class="modal-close" onclick="closeModal()" aria-label="Закрити"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-stats">
            <div class="modal-stat">
                <div class="modal-stat-label">Атомний номер</div>
                <div class="modal-stat-value">${el.number}</div>
            </div>
            <div class="modal-stat">
                <div class="modal-stat-label">Атомна маса</div>
                <div class="modal-stat-value">${el.mass} г/моль</div>
            </div>
            <div class="modal-stat">
                <div class="modal-stat-label">Період</div>
                <div class="modal-stat-value">${el.period}</div>
            </div>
            <div class="modal-stat">
                <div class="modal-stat-label">Група</div>
                <div class="modal-stat-value">${el.group}</div>
            </div>
        </div>
        <div class="modal-info">
            <div class="modal-info-row">
                <span class="modal-info-label">Електронна конфігурація</span>
                <span class="modal-info-value">${el.config}</span>
            </div>
            <div class="modal-info-row">
                <span class="modal-info-label">Густина</span>
                <span class="modal-info-value">${fmtDensity}</span>
            </div>
            <div class="modal-info-row">
                <span class="modal-info-label">Точка плавлення</span>
                <span class="modal-info-value">${fmtMelt}</span>
            </div>
            <div class="modal-info-row">
                <span class="modal-info-label">Точка кипіння</span>
                <span class="modal-info-value">${fmtBoil}</span>
            </div>
            <div class="modal-info-row">
                <span class="modal-info-label">Рік відкриття</span>
                <span class="modal-info-value">${fmtYear}</span>
            </div>
            <div class="modal-info-row">
                <span class="modal-info-label">Відкривач</span>
                <span class="modal-info-value">${fmtDiscoverer}</span>
            </div>
        </div>
        <button class="modal-add-btn" onclick="addToFormula('${el.symbol}')">
            <i class="fa-solid fa-plus"></i>&nbsp; Додати ${el.symbol} до формули
        </button>
    `;

    document.getElementById('modalOverlay').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
    document.body.style.overflow = '';
}

function closeModalOutside(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// Закриття по Escape
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
});

// =====================================================
// ДОДАТИ ЕЛЕМЕНТ ДО ФОРМУЛИ
// =====================================================
function addToFormula(symbol) {
    const input = document.getElementById('formulaInput');
    const pos = input.selectionStart || input.value.length;
    const before = input.value.substring(0, pos);
    const after = input.value.substring(pos);
    input.value = before + symbol + after;
    input.focus();
    input.setSelectionRange(pos + symbol.length, pos + symbol.length);
    closeModal();
    showToast(`${symbol} додано до формули`);
}

// =====================================================
// ДОПОМІЖНІ ФУНКЦІЇ
// =====================================================
function setFormula(formula) {
    document.getElementById('formulaInput').value = formula;
    calculate();
}

function clearFormula() {
    document.getElementById('formulaInput').value = '';
    document.getElementById('resultArea').innerHTML = '';
    highlightElements([]);
}

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timeout);
    toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
}

// Обчислення при Enter
document.getElementById('formulaInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') calculate();
});

// Живе підсвічування при вводі
document.getElementById('formulaInput').addEventListener('input', () => {
    const val = document.getElementById('formulaInput').value.trim();
    if (!val) {
        highlightElements([]);
        return;
    }
    if (/^[A-Za-z()0-9]+$/.test(val)) {
        const parsed = parseFormula(val);
        const syms = Object.keys(parsed).filter(s => elements[s]);
        if (syms.length > 0) highlightElements(syms);
        else highlightElements([]);
    }
});

// =====================================================
// ІНІЦІАЛІЗАЦІЯ
// =====================================================
buildTable();
</script>
